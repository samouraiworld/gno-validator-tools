---
# =============================================================================
# Betanet deployment — two-play structure
#
# Play 1: gno-sentry   (skipped entirely when gno_use_sentry: false)
# Play 2: gno-validator
#
# Typical run:
#   ansible-playbook -i inventory.yaml deployment/upload-betanet-deployment.yaml
# Limit to a single play:
#   ansible-playbook ... --tags secrets
#   ansible-playbook ... --tags compose
# =============================================================================

# ---------------------------------------------------------------------------
# PLAY 1 — Sentry node
# ---------------------------------------------------------------------------
- name: Deploy sentry node
  hosts: gno-sentry
  become: false
  vars:
    gno_secrets_init: false
    gno_use_sentry: true
    gno_network_mode: private
    gno_validator_has_internet: false
    gno_validator_private_ip: ""
    gno_validator_public_ip: ""
    gno_sentry_ip: ""
    gno_extra_persistent_peers: ""
    gno_dir: gnoland1
    gno_image: ghcr.io/gnolang/gno/gnoland:chain-gnoland1
    otel_image: otel/opentelemetry-collector-contrib:latest
    moniker_validator: samourai-crew-1
    moniker_sentry: samourai-dev-sentry-1
    pex_validator: "False"
    seeds: ""
    persistent_peers_sentry: ""
    genesis_url: "https://gno-testnets-genesis.s3.eu-central-1.amazonaws.com/gnoland1/genesis.json"
    config_url: "https://raw.githubusercontent.com/moul/gno/refs/heads/betanet-examples/misc/deployments/gnoland1/config.toml"

  when: gno_use_sentry | bool

  tasks:
    # --- Directory -----------------------------------------------------------
    - name: Create gnoland working directory on sentry
      ansible.builtin.file:
        path: /root/{{ gno_dir }}
        state: directory
        mode: "0750"
      tags: [config]

    # --- Secrets -------------------------------------------------------------
    - name: "WARNING: Initialize gnoland secrets (resets node identity)"
      ansible.builtin.command: gnoland secrets init
      args:
        chdir: /root/{{ gno_dir }}
      when: gno_secrets_init | bool
      tags: [secrets]

    - name: Check that secrets directory already exists
      ansible.builtin.stat:
        path: /root/{{ gno_dir }}/secrets
      register: secrets_dir_stat
      when: not gno_secrets_init | bool
      tags: [secrets]

    - name: Fail if secrets are missing and gno_secrets_init is false
      ansible.builtin.fail:
        msg: >
          Secrets directory /root/{{ gno_dir }}/secrets does not exist on
          {{ inventory_hostname }}. Either run with gno_secrets_init: true for
          a first-time deployment, or restore your existing secrets before
          re-running this playbook.
      when:
        - not gno_secrets_init | bool
        - not secrets_dir_stat.stat.exists
      tags: [secrets]

    # --- Read secrets --------------------------------------------------------
    - name: Read gnoland secrets from sentry
      ansible.builtin.command: gnoland secrets get
      args:
        chdir: /root/{{ gno_dir }}
      register: secrets_raw
      changed_when: false
      tags: [secrets]

    - name: Parse secrets JSON
      ansible.builtin.set_fact:
        secrets_json: "{{ secrets_raw.stdout | from_json }}"
      tags: [secrets]

    - name: Set validator_node_id fact for sentry
      ansible.builtin.set_fact:
        validator_node_id: "{{ secrets_json.node_id.id }}"
      tags: [secrets]

    - name: Set p2p_address_real fact for sentry (replace 0.0.0.0 with ansible_host)
      ansible.builtin.set_fact:
        p2p_address_real: "{{ secrets_json.node_id.p2p_address | regex_replace('0.0.0.0', ansible_host) }}"
      tags: [secrets]

    # --- Docker Compose template ---------------------------------------------
    - name: Render docker-sentry.yml.j2 to docker-compose.yml on sentry
      ansible.builtin.template:
        src: templates/docker-sentry.yml.j2
        dest: /root/{{ gno_dir }}/docker-compose.yml
        mode: "0640"
      tags: [docker]

    # --- Download config and genesis to localhost ----------------------------
    - name: Download genesis.json to localhost
      ansible.builtin.get_url:
        url: "{{ genesis_url }}"
        dest: "../{{ gno_dir }}/genesis.json"
        mode: "0644"
      delegate_to: localhost
      tags: [config]

    - name: Download config.toml to localhost
      ansible.builtin.get_url:
        url: "{{ config_url }}"
        dest: "../{{ gno_dir }}/config.toml"
        mode: "0644"
      delegate_to: localhost
      tags: [config]

    # --- Copy config files to sentry -----------------------------------------
    - name: Copy config.toml to sentry
      ansible.builtin.copy:
        src: ../{{ gno_dir }}/config.toml
        dest: /root/{{ gno_dir }}/config.toml
        mode: "0644"
      tags: [config]

    - name: Copy genesis.json to sentry
      ansible.builtin.copy:
        src: ../{{ gno_dir }}/genesis.json
        dest: /root/{{ gno_dir }}/genesis.json
        mode: "0644"
      tags: [config]

    - name: Copy entrypoint.sh to sentry
      ansible.builtin.copy:
        src: ../{{ gno_dir }}/entrypoint.sh
        dest: /root/{{ gno_dir }}/entrypoint.sh
        mode: "0755"
      tags: [config]

    # --- Docker image handling -----------------------------------------------
    - name: Pull gno image on localhost (airgapped mode)
      ansible.builtin.command: docker pull {{ item }}
      loop:
        - "{{ gno_image }}"
      delegate_to: localhost
      when: not gno_validator_has_internet | bool
      tags: [docker]

    - name: Save gno image to tar on localhost (airgapped mode)
      ansible.builtin.command: docker save -o ../{{ gno_dir }}/gnoland.tar {{ gno_image }}
      delegate_to: localhost
      when: not gno_validator_has_internet | bool
      tags: [docker]

    - name: Copy gnoland image tar to sentry (airgapped mode)
      ansible.builtin.copy:
        src: ../{{ gno_dir }}/gnoland.tar
        dest: /tmp/gnoland.tar
      when: not gno_validator_has_internet | bool
      tags: [docker]

    - name: Load gnoland image on sentry (airgapped mode)
      ansible.builtin.command: docker load -i /tmp/gnoland.tar
      when: not gno_validator_has_internet | bool
      tags: [docker]

    - name: Pull gno image directly on sentry (internet mode)
      ansible.builtin.command: docker pull {{ gno_image }}
      when: gno_validator_has_internet | bool
      tags: [docker]

    # --- Start services ------------------------------------------------------
    - name: Start sentry via docker compose
      ansible.builtin.command: docker compose up -d
      args:
        chdir: /root/{{ gno_dir }}
      tags: [compose]


# ---------------------------------------------------------------------------
# PLAY 2 — Validator node
# ---------------------------------------------------------------------------
- name: Deploy validator node
  hosts: gno-validator
  become: false
  vars:
    gno_secrets_init: false
    gno_use_sentry: true
    gno_network_mode: private
    gno_validator_has_internet: false
    gno_validator_private_ip: ""
    gno_validator_public_ip: ""
    gno_sentry_ip: ""
    gno_extra_persistent_peers: ""
    gno_dir: gnoland1
    gno_image: ghcr.io/gnolang/gno/gnoland:chain-gnoland1
    otel_image: otel/opentelemetry-collector-contrib:latest
    moniker_validator: samourai-crew-1
    moniker_sentry: samourai-dev-sentry-1
    pex_validator: "False"
    seeds: ""
    persistent_peers_sentry: ""
    genesis_url: "https://gno-testnets-genesis.s3.eu-central-1.amazonaws.com/gnoland1/genesis.json"
    config_url: "https://raw.githubusercontent.com/moul/gno/refs/heads/betanet-examples/misc/deployments/gnoland1/config.toml"

  pre_tasks:
    - name: Set SSH connection for private network mode
      ansible.builtin.set_fact:
        ansible_host: "{{ gno_validator_private_ip }}"
        ansible_ssh_common_args: "-J root@{{ gno_sentry_ip }}"
      when: gno_network_mode == "private"

    - name: Set SSH connection for public network mode
      ansible.builtin.set_fact:
        ansible_host: "{{ gno_validator_public_ip }}"
        ansible_ssh_common_args: ""
      when: gno_network_mode == "public"

  tasks:
    # --- Directories ---------------------------------------------------------
    - name: Create gnoland working directory on validator
      ansible.builtin.file:
        path: /root/{{ gno_dir }}
        state: directory
        mode: "0750"
      tags: [config]

    - name: Create otel config directory on validator
      ansible.builtin.file:
        path: /root/{{ gno_dir }}/otel
        state: directory
        mode: "0750"
      tags: [config]

    # --- OTEL config ---------------------------------------------------------
    - name: Copy otel-config.yaml to validator
      ansible.builtin.copy:
        src: ../{{ gno_dir }}/otel/otel-config.yaml
        dest: /root/{{ gno_dir }}/otel/otel-config.yaml
        mode: "0644"
      tags: [config]

    # --- Secrets -------------------------------------------------------------
    - name: "WARNING: Initialize gnoland secrets (resets node identity)"
      ansible.builtin.command: gnoland secrets init
      args:
        chdir: /root/{{ gno_dir }}
      when: gno_secrets_init | bool
      tags: [secrets]

    - name: Check that secrets directory already exists
      ansible.builtin.stat:
        path: /root/{{ gno_dir }}/secrets
      register: secrets_dir_stat
      when: not gno_secrets_init | bool
      tags: [secrets]

    - name: Fail if secrets are missing and gno_secrets_init is false
      ansible.builtin.fail:
        msg: >
          Secrets directory /root/{{ gno_dir }}/secrets does not exist on
          {{ inventory_hostname }}. Either run with gno_secrets_init: true for
          a first-time deployment, or restore your existing secrets before
          re-running this playbook.
      when:
        - not gno_secrets_init | bool
        - not secrets_dir_stat.stat.exists
      tags: [secrets]

    # --- Read secrets --------------------------------------------------------
    - name: Read gnoland secrets from validator
      ansible.builtin.command: gnoland secrets get
      args:
        chdir: /root/{{ gno_dir }}
      register: secrets_raw
      changed_when: false
      tags: [secrets]

    - name: Parse secrets JSON
      ansible.builtin.set_fact:
        secrets_json: "{{ secrets_raw.stdout | from_json }}"
      tags: [secrets]

    - name: Set validator_node_id fact for validator
      ansible.builtin.set_fact:
        validator_node_id: "{{ secrets_json.node_id.id }}"
      tags: [secrets]

    - name: Set p2p_address_real fact for validator (private network — use private IP)
      ansible.builtin.set_fact:
        p2p_address_real: "{{ secrets_json.node_id.p2p_address | regex_replace('0.0.0.0', gno_validator_private_ip) }}"
      when: gno_network_mode == "private"
      tags: [secrets]

    - name: Set p2p_address_real fact for validator (public network — use public IP)
      ansible.builtin.set_fact:
        p2p_address_real: "{{ secrets_json.node_id.p2p_address | regex_replace('0.0.0.0', gno_validator_public_ip) }}"
      when: gno_network_mode == "public"
      tags: [secrets]

    # --- Persistent peers ----------------------------------------------------
    - name: Set persistent_peers fact from sentry hostvars (sentry mode)
      ansible.builtin.set_fact:
        persistent_peers: "{{ hostvars['gno-sentry'].validator_node_id }}@{{ hostvars['gno-sentry'].p2p_address_real }}"
      when: gno_use_sentry | bool
      tags: [config]

    - name: Set persistent_peers fact from gno_extra_persistent_peers (standalone mode)
      ansible.builtin.set_fact:
        persistent_peers: "{{ gno_extra_persistent_peers }}"
      when: not gno_use_sentry | bool
      tags: [config]

    # --- Docker Compose template ---------------------------------------------
    - name: Render docker-validator.yml.j2 to docker-compose.yml on validator (sentry mode)
      ansible.builtin.template:
        src: templates/docker-validator.yml.j2
        dest: /root/{{ gno_dir }}/docker-compose.yml
        mode: "0640"
      when: gno_use_sentry | bool
      tags: [docker]

    - name: Render docker-validator-standalone.yml.j2 to docker-compose.yml on validator (standalone mode)
      ansible.builtin.template:
        src: templates/docker-validator-standalone.yml.j2
        dest: /root/{{ gno_dir }}/docker-compose.yml
        mode: "0640"
      when: not gno_use_sentry | bool
      tags: [docker]

    # --- Download config and genesis to localhost ----------------------------
    - name: Check if genesis.json already exists on localhost
      ansible.builtin.stat:
        path: "../{{ gno_dir }}/genesis.json"
      register: genesis_stat
      delegate_to: localhost
      tags: [config]

    - name: Download genesis.json to localhost
      ansible.builtin.get_url:
        url: "{{ genesis_url }}"
        dest: "../{{ gno_dir }}/genesis.json"
        mode: "0644"
      delegate_to: localhost
      when: not genesis_stat.stat.exists
      tags: [config]

    - name: Check if config.toml already exists on localhost
      ansible.builtin.stat:
        path: "../{{ gno_dir }}/config.toml"
      register: config_stat
      delegate_to: localhost
      tags: [config]

    - name: Download config.toml to localhost
      ansible.builtin.get_url:
        url: "{{ config_url }}"
        dest: "../{{ gno_dir }}/config.toml"
        mode: "0644"
      delegate_to: localhost
      when: not config_stat.stat.exists
      tags: [config]

    # --- Copy config files to validator --------------------------------------
    - name: Copy config.toml to validator
      ansible.builtin.copy:
        src: ../{{ gno_dir }}/config.toml
        dest: /root/{{ gno_dir }}/config.toml
        mode: "0644"
      tags: [config]

    - name: Copy genesis.json to validator
      ansible.builtin.copy:
        src: ../{{ gno_dir }}/genesis.json
        dest: /root/{{ gno_dir }}/genesis.json
        mode: "0644"
      tags: [config]

    - name: Copy entrypoint.sh to validator
      ansible.builtin.copy:
        src: ../{{ gno_dir }}/entrypoint.sh
        dest: /root/{{ gno_dir }}/entrypoint.sh
        mode: "0755"
      tags: [config]

    # --- Docker image handling (airgapped) -----------------------------------
    - name: Pull images on localhost (airgapped mode)
      ansible.builtin.command: docker pull {{ item }}
      loop:
        - "{{ gno_image }}"
        - "{{ otel_image }}"
      delegate_to: localhost
      when: not gno_validator_has_internet | bool
      tags: [docker]

    - name: Save images to tar on localhost (airgapped mode)
      ansible.builtin.command: docker save -o ../{{ gno_dir }}/{{ item.name }}.tar {{ item.image }}
      loop:
        - { name: gnoland, image: "{{ gno_image }}" }
        - { name: otel, image: "{{ otel_image }}" }
      delegate_to: localhost
      when: not gno_validator_has_internet | bool
      tags: [docker]

    - name: Copy image tars to validator (airgapped mode)
      ansible.builtin.copy:
        src: ../{{ gno_dir }}/{{ item }}.tar
        dest: /tmp/{{ item }}.tar
      loop:
        - gnoland
        - otel
      when: not gno_validator_has_internet | bool
      tags: [docker]

    - name: Load images on validator (airgapped mode)
      ansible.builtin.command: docker load -i /tmp/{{ item }}.tar
      loop:
        - gnoland
        - otel
      when: not gno_validator_has_internet | bool
      tags: [docker]

    # --- Docker image handling (internet) ------------------------------------
    - name: Pull Docker images directly on validator (internet mode)
      ansible.builtin.command: docker pull {{ item }}
      loop:
        - "{{ gno_image }}"
        - "{{ otel_image }}"
      when: gno_validator_has_internet | bool
      tags: [docker]

    # --- Start services ------------------------------------------------------
    - name: Start validator via docker compose
      ansible.builtin.command: docker compose up -d
      args:
        chdir: /root/{{ gno_dir }}
      tags: [compose]
