---
# =============================================================================
# Deploy Grafana on monitoring server
#
# Grafana runs in Docker Compose, NGINX proxies it (HTTP or HTTPS).
# The Loki datasource is provisioned automatically on first start.
#
# Prerequisites:
#   - Docker and NGINX are installed automatically by this playbook (docker + nginx roles)
#   - Loki deployed and running (run 5-deploy-loki.yaml first)
#   - group_vars/monitoring.yml configured with grafana_domain and grafana_admin_password
#
# Note (Vagrant): the monitoring host is in group 'monitoring_servers', not 'monitoring'.
#   Pass the target explicitly and load group_vars manually (same as Loki):
#     ansible-playbook -i inventory-vagrant.yaml 8-deploy-grafana.yaml \
#       -e target=gno-monitoring-test \
#       -e @group_vars/monitoring.yml \
#       --skip-tags tls
#
# Usage:
#   # Production — full deploy with TLS
#   ansible-playbook -i inventory.yaml 8-deploy-grafana.yaml \
#     -e @group_vars/monitoring.yml
#
#   # Vagrant — HTTP only (no real domain)
#   ansible-playbook -i inventory-vagrant.yaml 8-deploy-grafana.yaml \
#     -e target=gno-monitoring-test \
#     -e @group_vars/monitoring.yml \
#     --skip-tags tls
#
#   # Redeploy container only (skip NGINX and TLS)
#   ansible-playbook -i inventory.yaml 8-deploy-grafana.yaml \
#     -e @group_vars/monitoring.yml \
#     --tags grafana
#
#   # Redeploy NGINX vhost + TLS only
#   ansible-playbook -i inventory.yaml 8-deploy-grafana.yaml \
#     -e @group_vars/monitoring.yml \
#     --tags tls
# =============================================================================

- name: Deploy Grafana on monitoring server
  hosts: "{{ target | default('monitoring') }}"
  become: false

  roles:
    - docker
    - nginx

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

    - name: Restart grafana
      ansible.builtin.command:
        cmd: docker compose restart grafana
        chdir: /opt/grafana

  tasks:
    # --- Directories ----------------------------------------------------------
    - name: Create Grafana directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/grafana
        - /opt/grafana/data
        - /opt/grafana/provisioning
        - /opt/grafana/provisioning/datasources
      tags: [grafana]

    # --- Docker Compose -------------------------------------------------------
    - name: Deploy Grafana Docker Compose file
      ansible.builtin.template:
        src: Loki/templates/docker-grafana.yml.j2
        dest: /opt/grafana/docker-compose.yml
        mode: "0640"
      notify: Restart grafana
      tags: [grafana]

    # --- Provisioning ---------------------------------------------------------
    - name: Deploy Loki datasource provisioning file
      ansible.builtin.template:
        src: Loki/templates/grafana-loki-datasource.yml.j2
        dest: /opt/grafana/provisioning/datasources/loki.yml
        mode: "0644"
      notify: Restart grafana
      tags: [grafana]

    # --- Start container ------------------------------------------------------
    - name: Pull Grafana image
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: /opt/grafana
      changed_when: false
      tags: [grafana]

    - name: Start Grafana via docker compose
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: /opt/grafana
      tags: [grafana]

    # --- NGINX vhost (HTTP — works for Vagrant and as certbot challenge) ------
    - name: Deploy Grafana NGINX vhost (HTTP)
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/{{ grafana_domain }}
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name {{ grafana_domain }};

              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
              }
          }
      notify: Reload nginx
      tags: [grafana]

    - name: Enable Grafana NGINX vhost
      ansible.builtin.file:
        src: /etc/nginx/sites-available/{{ grafana_domain }}
        dest: /etc/nginx/sites-enabled/{{ grafana_domain }}
        state: link
        force: true
      notify: Reload nginx
      tags: [grafana]

    - name: Validate NGINX configuration
      ansible.builtin.command: nginx -t
      changed_when: false
      tags: [grafana]

    - name: Force NGINX reload before requesting certificate
      ansible.builtin.meta: flush_handlers
      tags: [grafana]

    # --- Let's Encrypt --------------------------------------------------------
    - name: Check if TLS certificate already exists
      ansible.builtin.stat:
        path: /etc/letsencrypt/live/{{ grafana_domain }}/fullchain.pem
      register: grafana_cert_stat
      tags: [tls]

    - name: Request Let's Encrypt certificate
      ansible.builtin.command:
        cmd: >
          certbot certonly --nginx
          -d {{ grafana_domain }}
          --non-interactive
          --agree-tos
          --email {{ letsencrypt_email }}
      when: not grafana_cert_stat.stat.exists
      tags: [tls]

    # --- NGINX vhost with TLS (replaces HTTP vhost) ---------------------------
    - name: Deploy Grafana NGINX vhost with TLS
      ansible.builtin.template:
        src: Loki/templates/nginx-grafana.conf.j2
        dest: /etc/nginx/sites-available/{{ grafana_domain }}
        mode: "0644"
      notify: Reload nginx
      tags: [tls]

    - name: Validate NGINX configuration (TLS vhost)
      ansible.builtin.command: nginx -t
      changed_when: false
      tags: [tls]

    - name: Force NGINX reload with TLS vhost
      ansible.builtin.meta: flush_handlers
      tags: [tls]
