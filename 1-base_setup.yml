---
# =============================================================================
# Base system setup — Gnoland validator or sentry node
#
# Remplace base_setup_validator.yaml et base_setup_sentry.yaml.
# Le rôle nginx est appliqué uniquement sur les hôtes du groupe gno-sentry.
#
# Usage:
#   ansible-playbook -i inventory.yaml base_setup.yml -e target=gno-sentry
#   ansible-playbook -i inventory.yaml base_setup.yml -e target=gno-validator
#
# Variables:
#   target   - hôte ou groupe d'inventaire à cibler (obligatoire)
#   gno_dir  - répertoire de travail gnoland sous /root (défaut: gnoland1)
# =============================================================================

- name: Base system setup — Gnoland node
  hosts: "{{ target }}"
  become: false

  vars:
    gno_dir: gnoland1

  roles:
    - base_setup
    - node_exporter
    - docker
    - ufw
    - gnoland
    - role: nginx
      when: "'gno-sentry' in group_names"

  tasks:
    - name: Create gnoland working directory
      ansible.builtin.file:
        path: /root/{{ gno_dir }}
        state: directory
        mode: "0750"

    - name: Create otel config directory
      ansible.builtin.file:
        path: /root/{{ gno_dir }}/otel
        state: directory
        mode: "0750"

    - name: Copy otel-config.yaml
      ansible.builtin.copy:
        src: ./validator/otel/otel-config.yaml
        dest: /root/{{ gno_dir }}/otel/otel-config.yaml
        mode: "0644"
