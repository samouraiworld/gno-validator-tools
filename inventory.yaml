---
# =============================================================================
# Ansible inventory — gno-validator-tools
# Copy this file to inventory.yaml and replace all <PLACEHOLDER> values.
# =============================================================================

# --- Sentry node --------------------------------------------------------------
gno-sentry:
  hosts:
    gno-sentry:
      ansible_host: <SENTRY_PUBLIC_IP>
      private_ip: <SENTRY_PRIVATE_IP>
      ufw_ports_app: [26656]
      ufw_ports_moni: [9100, 9113, 9464]
      ufw_allow_ip: <MONITORING_IP>
  vars:
    ansible_user: root

# --- Betanet group (validator + sentry) ---------------------------------------
betanet:
  hosts:
    gno-sentry:
      ansible_host: <SENTRY_PUBLIC_IP>
      private_ip: <SENTRY_PRIVATE_IP>
    gno-validator:
      ansible_host: <VALIDATOR_PUBLIC_IP>
      public_ip: <VALIDATOR_PUBLIC_IP>
      private_ip: <VALIDATOR_PRIVATE_IP>
  vars:
    ansible_user: root

# --- Monitoring server --------------------------------------------------------
monitoring:
  hosts:
    monitoring-server:
      ansible_host: <MONITORING_PUBLIC_IP>
  vars:
    ansible_user: root

# --- Local dev / Vagrant ------------------------------------------------------
vagrant:
  hosts:
    vagrant:
      ansible_host: 127.0.0.1
      ansible_port: 2222
      ansible_ssh_private_key_file: vagrant/.vagrant/machines/default/virtualbox/private_key
  vars:
    ansible_user: root
