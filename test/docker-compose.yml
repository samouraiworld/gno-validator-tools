services:
  validator:
    image: "gno-validator:test13"
#    image: "ghcr.io/gnolang/gno/gnoland:chain-test11"
    restart: on-failure
    ports:
      - 127.0.0.1:26658:26657
    volumes:
      - ./validator/entrypoint.sh:/entrypoint.sh:ro
      - ./validator/config.toml:/gnoroot/config.toml:ro
      - ./validator/genesis.json:/gnoroot/gnoland-data/genesis.json:ro
      - ./validator/gnoland-data:/gnoroot/gnoland-data
    entrypoint: /entrypoint.sh
    environment:
      MONIKER: "samourai-crew-1"
      SEEDS: "g1aeqqkpxfjxnvvdf9fa6ydluw7hg524g7r9l7kn@validator2:26656,g1z67dals6atpsreepsu5mmz35srd3egrgm0t2dh@validator3:26656"
