---
# =============================================================================
# Base system setup for a Gnoland validator node
#
# Installs: base packages, Docker, UFW firewall, Node Exporter, gnoland binary
# Then configures the private VLAN interface and copies initial runtime files.
#
# Usage:
#   ansible-playbook -i inventory.yaml base_setup_validator.yaml \
#     -e target=gno-validator-1
#
# Variables:
#   target          - inventory host or group to target (required)
#   gno_network_mode - private (default) or public — controls ansible_host resolution
#   vlan_id         - VLAN ID for the private network interface (default: 2772)
#   gno_dir         - gnoland working directory under /root (default: gnoland1)
# =============================================================================

- name: Base system setup — Gnoland validator
  hosts: "{{ target | default('gno-validator') }}"
  become: false

  vars:
    gno_network_mode: private
    vlan_id: 2772
    gno_dir: gnoland1

  pre_tasks:
    - name: Set ansible_host to public IP (private network mode)
      ansible.builtin.set_fact:
        ansible_host: "{{ public_ip }}"
      when:
        - gno_network_mode == "private"
        - public_ip is defined

    - name: Set ansible_host to public IP (public network mode)
      ansible.builtin.set_fact:
        ansible_host: "{{ public_ip }}"
      when:
        - gno_network_mode == "public"
        - public_ip is defined

  roles:
    - base_setup
    - node_exporter
    - docker
    - ufw
    - gnoland

  tasks:
    - name: Configure /etc/network/interfaces with private VLAN
      ansible.builtin.copy:
        dest: /etc/network/interfaces
        mode: "0644"
        content: |
          # Loopback
          auto lo
          iface lo inet loopback

          # Public WAN interface
          auto eno1
          iface eno1 inet dhcp

          # Private VLAN interface
          auto eno1.{{ vlan_id }}
          iface eno1.{{ vlan_id }} inet static
              address {{ hostvars[inventory_hostname]['private_ip'] }}
              netmask 255.255.252.0
      when:
        - gno_network_mode == "private"
        - private_ip is defined

    - name: Create gnoland working directory
      ansible.builtin.file:
        path: /root/{{ gno_dir }}
        state: directory
        mode: "0750"

    - name: Create otel config directory
      ansible.builtin.file:
        path: /root/{{ gno_dir }}/otel
        state: directory
        mode: "0750"

    - name: Copy otel-config.yaml
      ansible.builtin.copy:
        src: ../{{ gno_dir }}/otel/otel-config.yaml
        dest: /root/{{ gno_dir }}/otel/otel-config.yaml
        mode: "0644"
