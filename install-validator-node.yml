---
# =============================================================================
# Install validator node
#
# Prérequis : gnoland secrets init a été exécuté manuellement sur le validator.
# ansible-playbook -i inventory.yaml install-validator-node.yml
#
# Tags disponibles :
#   [config]   — répertoires, fichiers de config, génèse, OTEL
#   [docker]   — images Docker (pull / save / load)
#   [compose]  — démarrage du stack via docker compose
#
# Variables clés :
#   gno_use_sentry            (bool)  — utilise docker-validator.yml.j2 si true,
#                                       docker-validator-standalone.yml.j2 si false
#   gno_validator_has_internet (bool) — pull direct sur le validator si true,
#                                       transfert via localhost si false (airgapped)
# =============================================================================

- name: Install validator node
  hosts: gno-validator
  become: false

  vars:
    gno_dir: gnoland1
    gno_image: ghcr.io/gnolang/gno/gnoland:chain-gnoland1
    otel_image: otel/opentelemetry-collector-contrib:latest
    moniker_validator: samourai-crew-1
    moniker_sentry: samourai-dev-sentry-1
    pex_validator: "False"
    seeds: ""
    persistent_peers_sentry: ""
    private_peer_ids: ""
    genesis_url: "https://gno-testnets-genesis.s3.eu-central-1.amazonaws.com/gnoland1/genesis.json"
    config_url: "https://raw.githubusercontent.com/moul/gno/refs/heads/betanet-examples/misc/deployments/gnoland1/config.toml"
    gno_validator_has_internet: true
    gno_use_sentry: true

  tasks:

    # --- Répertoires de travail -----------------------------------------------
    - name: Create gnoland working directory on validator
      ansible.builtin.file:
        path: /root/{{ gno_dir }}
        state: directory
        mode: "0750"
      tags: [config]

    - name: Create otel config directory on validator
      ansible.builtin.file:
        path: /root/{{ gno_dir }}/otel
        state: directory
        mode: "0750"
      tags: [config]

    # --- Configuration OTEL --------------------------------------------------
    - name: Copy otel-config.yaml to validator
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/validator/otel/otel-config.yaml"
        dest: /root/{{ gno_dir }}/otel/otel-config.yaml
        mode: "0644"
      tags: [config]

    # --- Téléchargement de genesis.json en local ------------------------------
    - name: Check if genesis.json already exists on localhost
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/{{ gno_dir }}/genesis.json"
      register: genesis_stat
      delegate_to: localhost
      tags: [config]

    - name: Download genesis.json to localhost
      ansible.builtin.get_url:
        url: "{{ genesis_url }}"
        dest: "{{ playbook_dir }}/{{ gno_dir }}/genesis.json"
        mode: "0644"
      delegate_to: localhost
      when: not genesis_stat.stat.exists
      tags: [config]

    # --- Téléchargement de config.toml en local -------------------------------
    - name: Check if config.toml already exists on localhost
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/{{ gno_dir }}/config.toml"
      register: config_stat
      delegate_to: localhost
      tags: [config]

    - name: Download config.toml to localhost
      ansible.builtin.get_url:
        url: "{{ config_url }}"
        dest: "{{ playbook_dir }}/{{ gno_dir }}/config.toml"
        mode: "0644"
      delegate_to: localhost
      when: not config_stat.stat.exists
      tags: [config]

    # --- Copie des fichiers de configuration vers le validator ----------------
    - name: Copy config.toml to validator
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/validator/config.toml"
        dest: /root/{{ gno_dir }}/config.toml
        mode: "0644"
      tags: [config]

    - name: Copy genesis.json to validator
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/validator/genesis.json"
        dest: /root/{{ gno_dir }}/genesis.json
        mode: "0644"
      tags: [config]

    - name: Copy entrypoint.sh to validator
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/validator/entrypoint.sh"
        dest: /root/{{ gno_dir }}/entrypoint.sh
        mode: "0755"
      tags: [config]

    # --- Génération du docker-compose.yml ------------------------------------
    - name: Render docker-validator.yml.j2 to docker-compose.yml on validator (sentry mode)
      ansible.builtin.template:
        src: templates/docker-validator.yml.j2
        dest: /root/{{ gno_dir }}/docker-compose.yml
        mode: "0640"
      when: gno_use_sentry | bool
      tags: [config]

    - name: Render docker-validator-standalone.yml.j2 to docker-compose.yml on validator (standalone mode)
      ansible.builtin.template:
        src: templates/docker-validator-standalone.yml.j2
        dest: /root/{{ gno_dir }}/docker-compose.yml
        mode: "0640"
      when: not gno_use_sentry | bool
      tags: [config]

    # --- Gestion des images Docker (mode airgapped) --------------------------
    - name: Pull images on localhost (airgapped mode)
      ansible.builtin.command: docker pull {{ item }}
      loop:
        - "{{ gno_image }}"
        - "{{ otel_image }}"
      delegate_to: localhost
      when: not gno_validator_has_internet | bool
      tags: [docker]

    - name: Save images to tar on localhost (airgapped mode)
      ansible.builtin.command: >
        docker save -o {{ playbook_dir }}/validator/{{ item.name }}.tar {{ item.image }}
      loop:
        - { name: gnoland, image: "{{ gno_image }}" }
        - { name: otel,    image: "{{ otel_image }}" }
      delegate_to: localhost
      when: not gno_validator_has_internet | bool
      tags: [docker]

    - name: Copy image tars to validator (airgapped mode)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/validator/{{ item }}.tar"
        dest: /tmp/{{ item }}.tar
      loop:
        - gnoland
        - otel
      when: not gno_validator_has_internet | bool
      tags: [docker]

    - name: Load images on validator (airgapped mode)
      ansible.builtin.command: docker load -i /tmp/{{ item }}.tar
      loop:
        - gnoland
        - otel
      when: not gno_validator_has_internet | bool
      tags: [docker]

    # --- Gestion des images Docker (mode internet) ---------------------------
    - name: Pull Docker images directly on validator (internet mode)
      ansible.builtin.command: docker pull {{ item }}
      loop:
        - "{{ gno_image }}"
        - "{{ otel_image }}"
      when: gno_validator_has_internet | bool
      tags: [docker]

    # --- Démarrage du stack --------------------------------------------------
    - name: Start validator via docker compose
      ansible.builtin.command: docker compose up -d
      args:
        chdir: /root/{{ gno_dir }}
      tags: [compose]
