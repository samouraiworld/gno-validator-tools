---
# =============================================================================
# Deploy Loki log aggregation stack
#
# Play 1: monitoring server — Loki binary + systemd + NGINX vhost + Let's Encrypt
# Play 2: gno-sentry       — loki-proxy NGINX vhost (relay with token injection)
#
# Prerequisites:
#   - Ubuntu/Debian on all target hosts
#   - NGINX installed on monitoring server (run base_setup role first)
#   - NGINX installed on sentry (run base_setup_sentry.yaml first)
#   - Domain name {{ loki_domain }} pointing to monitoring server IP
#   - group_vars/monitoring.yml configured (copy from monitoring.yml.example)
#
# Security:
#   - loki_bearer_token must be encrypted with ansible-vault:
#     ansible-vault encrypt_string 'your-token' --name 'loki_bearer_token'
#
# Usage:
#   ansible-playbook -i inventory.yaml deploy-loki.yaml
#   ansible-playbook -i inventory.yaml deploy-loki.yaml --tags loki -e target=vagrant
#   ansible-playbook -i inventory.yaml deploy-loki.yaml --tags proxy -e target=vagrant
# =============================================================================

# ---------------------------------------------------------------------------
# PLAY 1 — Loki on monitoring server
# ---------------------------------------------------------------------------
- name: Deploy Loki on monitoring server
  hosts: "{{ target | default('monitoring') }}"
  become: false

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

    - name: Restart loki
      ansible.builtin.service:
        name: loki
        state: restarted

  tasks:
    # --- User and directories ------------------------------------------------
    - name: Create loki system user
      ansible.builtin.user:
        name: loki
        system: true
        shell: /sbin/nologin
        create_home: false
      tags: [loki]

    - name: Create Loki directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: loki
        group: loki
        mode: "0750"
      loop:
        - /opt/loki
        - /etc/loki
        - /var/lib/loki
        - /var/lib/loki/chunks
        - /var/lib/loki/rules
        - /var/lib/loki/compactor
      tags: [loki]

    # --- Binary install -------------------------------------------------------
    - name: Check installed Loki version
      ansible.builtin.command: /opt/loki/loki --version
      register: loki_installed_version
      changed_when: false
      failed_when: false
      tags: [loki]

    - name: Install unzip
      ansible.builtin.apt:
        name: unzip
        state: present
        update_cache: false
      when: loki_installed_version.rc != 0 or loki_version not in loki_installed_version.stdout
      tags: [loki]

    - name: Download Loki binary archive
      ansible.builtin.get_url:
        url: "https://github.com/grafana/loki/releases/download/v{{ loki_version }}/loki-linux-amd64.zip"
        dest: /tmp/loki-linux-amd64.zip
        mode: "0644"
        force: true
      when: loki_installed_version.rc != 0 or loki_version not in loki_installed_version.stdout
      tags: [loki]

    - name: Extract Loki binary
      ansible.builtin.unarchive:
        src: /tmp/loki-linux-amd64.zip
        dest: /opt/loki/
        remote_src: true
        include:
          - loki-linux-amd64
      when: loki_installed_version.rc != 0 or loki_version not in loki_installed_version.stdout
      tags: [loki]

    - name: Install Loki binary
      ansible.builtin.command:
        cmd: mv /opt/loki/loki-linux-amd64 /opt/loki/loki
      when: loki_installed_version.rc != 0 or loki_version not in loki_installed_version.stdout
      tags: [loki]

    - name: Set Loki binary permissions
      ansible.builtin.file:
        path: /opt/loki/loki
        mode: "0755"
        owner: loki
        group: loki
      tags: [loki]

    # --- Configuration --------------------------------------------------------
    - name: Deploy Loki configuration
      ansible.builtin.template:
        src: Loki/templates/loki-config.yml.j2
        dest: /etc/loki/config.yml
        owner: loki
        group: loki
        mode: "0640"
      notify: Restart loki
      tags: [loki]

    # --- Systemd service ------------------------------------------------------
    - name: Deploy loki.service systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/loki.service
        mode: "0644"
        content: |
          [Unit]
          Description=Loki log aggregation service
          Documentation=https://grafana.com/docs/loki/latest/
          After=network.target

          [Service]
          Type=simple
          User=loki
          ExecStart=/opt/loki/loki -config.file=/etc/loki/config.yml
          Restart=on-failure
          RestartSec=5s
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
      notify: Restart loki
      tags: [loki]

    - name: Enable and start Loki service
      ansible.builtin.systemd:
        name: loki
        enabled: true
        state: started
        daemon_reload: true
      tags: [loki]

    # --- NGINX vhost ----------------------------------------------------------
    - name: Deploy Loki NGINX vhost (pre-TLS — HTTP only for certbot challenge)
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/{{ loki_domain }}
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name {{ loki_domain }};
              location / { return 200 'ok'; }
          }
      notify: Reload nginx
      tags: [loki, tls]

    - name: Enable Loki NGINX vhost
      ansible.builtin.file:
        src: /etc/nginx/sites-available/{{ loki_domain }}
        dest: /etc/nginx/sites-enabled/{{ loki_domain }}
        state: link
        force: true
      notify: Reload nginx
      tags: [loki, tls]

    - name: Validate NGINX configuration
      ansible.builtin.command: nginx -t
      changed_when: false
      tags: [loki, tls]

    - name: Force NGINX reload before requesting certificate
      ansible.builtin.meta: flush_handlers
      tags: [loki, tls]

    # --- Let's Encrypt --------------------------------------------------------
    - name: Check if TLS certificate already exists
      ansible.builtin.stat:
        path: /etc/letsencrypt/live/{{ loki_domain }}/fullchain.pem
      register: loki_cert_stat
      tags: [loki, tls]

    - name: Request Let's Encrypt certificate
      ansible.builtin.command:
        cmd: >
          certbot certonly --nginx
          -d {{ loki_domain }}
          --non-interactive
          --agree-tos
          --email {{ letsencrypt_email }}
      when: not loki_cert_stat.stat.exists
      tags: [loki, tls]

    # --- NGINX vhost with TLS -------------------------------------------------
    - name: Deploy Loki NGINX vhost with TLS
      ansible.builtin.template:
        src: Loki/templates/nginx-loki-monitoring.conf.j2
        dest: /etc/nginx/sites-available/{{ loki_domain }}
        mode: "0644"
      notify: Reload nginx
      when: loki_cert_stat.stat.exists or not loki_cert_stat.stat.exists
      tags: [loki, tls]

    - name: Validate NGINX configuration (TLS vhost)
      ansible.builtin.command: nginx -t
      changed_when: false
      tags: [loki, tls]

    - name: Force NGINX reload with TLS vhost
      ansible.builtin.meta: flush_handlers
      tags: [loki, tls]

# ---------------------------------------------------------------------------
# PLAY 2 — loki-proxy relay on sentry
# ---------------------------------------------------------------------------
- name: Deploy loki-proxy on sentry
  hosts: gno-sentry
  become: false

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

  tasks:
    - name: Deploy loki-proxy NGINX vhost
      ansible.builtin.template:
        src: Loki/templates/nginx-loki-proxy.conf.j2
        dest: /etc/nginx/sites-available/loki-proxy
        mode: "0644"
      notify: Reload nginx
      tags: [proxy]

    - name: Enable loki-proxy NGINX vhost
      ansible.builtin.file:
        src: /etc/nginx/sites-available/loki-proxy
        dest: /etc/nginx/sites-enabled/loki-proxy
        state: link
        force: true
      notify: Reload nginx
      tags: [proxy]

    - name: Validate NGINX configuration
      ansible.builtin.command: nginx -t
      changed_when: false
      tags: [proxy]

    - name: Force NGINX reload
      ansible.builtin.meta: flush_handlers
      tags: [proxy]
